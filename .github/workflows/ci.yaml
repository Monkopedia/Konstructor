name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Install Xvfb and Playwright system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-4-1 \
            libflite1 \
            libharfbuzz-icu0 \
            libmanette-0.2-0 \
            libenchant-2-2 \
            libhyphen0 \
            libicu74 || true

      # The Ktor CIO / Netty server and WebSocket use a lot of file descriptors
      # during the e2e runs; bump the limit.
      - name: Raise file descriptor limit
        run: ulimit -n 4096 || true

      - name: Autostyle check
        run: ./gradlew autostyleCheck

      - name: Build shadowJar (produces the backend fat jar e2e tests run against)
        run: ./gradlew shadowJar

      - name: Run backend + protocol unit tests
        run: ./gradlew test

      - name: Run e2e tests under Xvfb
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' ./gradlew :e2e:test -Pe2e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload e2e screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/build/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test XML (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: '**/build/test-results/**/*.xml'
          if-no-files-found: ignore
          retention-days: 14
