<!DOCTYPE html>
<html lang="en" style="height: 100%; margin: 0;">
<head>
    <meta charset="UTF-8">
    <title>Konstructor</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #121212;
            color: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        #gl-pane {
            width: 50%;
            height: 100%;
            background: #263238;
        }
        #compose-pane {
            width: 50%;
            height: 100%;
            background: #121212;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121212;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 87, 34, 0.2);
            border-top-color: #ff5722;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 14px;
            color: #BBB;
        }
    </style>
</head>
<body style="height: 100%; margin: 0;">
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading Konstructor…</div>
</div>
<div id="app-container">
    <div id="gl-pane"></div>
    <div id="compose-pane"></div>
</div>
<script>
    // Expose a global hook that the Kotlin app calls when the bridge is ready.
    // The loading overlay hides when that fires (after Compose has rendered).
    (function() {
        var overlay = document.getElementById('loading-overlay');
        if (!overlay) return;
        var hidden = false;
        globalThis.__konstructorLoaded = function() {
            if (hidden) return;
            hidden = true;
            overlay.classList.add('hidden');
            setTimeout(function() { overlay.remove(); }, 500);
        };
        // Fallback: hide after 30s regardless
        setTimeout(globalThis.__konstructorLoaded, 30000);
    })();
</script>
<script src="frontend.js"></script>
</body>
</html>
