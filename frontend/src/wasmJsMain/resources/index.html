<!DOCTYPE html>
<html lang="en" style="height: 100%; margin: 0;">
<head>
    <meta charset="UTF-8">
    <title>Konstructor</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #121212;
            color: #FAFAFA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        #gl-pane {
            width: 50%;
            height: 100%;
            background: #263238;
        }
        #compose-pane {
            width: 50%;
            height: 100%;
            background: #121212;
        }
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121212;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 87, 34, 0.2);
            border-top-color: #ff5722;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 14px;
            color: #BBB;
        }
    </style>
</head>
<body style="height: 100%; margin: 0;">
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading Konstructor…</div>
</div>
<div id="app-container">
    <div id="gl-pane"></div>
    <div id="compose-pane"></div>
</div>
<script>
    // Hide the loading overlay once Compose has drawn its first canvas inside #compose-pane.
    (function() {
        var overlay = document.getElementById('loading-overlay');
        if (!overlay) return;
        var hidden = false;
        function hide() {
            if (hidden) return;
            hidden = true;
            overlay.classList.add('hidden');
            setTimeout(function() { overlay.remove(); }, 500);
        }
        // Watch for a canvas appearing in the compose-pane (Skiko renders into a shadow DOM canvas)
        var composePane = document.getElementById('compose-pane');
        if (composePane) {
            var observer = new MutationObserver(function() {
                // Heuristic: once the shadow DOM is established and has children, assume ready
                if (composePane.shadowRoot || composePane.children.length > 0) {
                    // Small delay to let initial paint finish
                    setTimeout(hide, 200);
                    observer.disconnect();
                }
            });
            observer.observe(composePane, { childList: true, subtree: true });
        }
        // Fallback: hide after 30s regardless
        setTimeout(hide, 30000);
    })();
</script>
<script src="frontend.js"></script>
</body>
</html>
